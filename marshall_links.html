<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marshall's Links</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --border: #222;
    --cyan: #00f5d4;
    --magenta: #f700ff;
    --text: #e8e8e8;
    --muted: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,245,212,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(247,0,255,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .header {
    text-align: center;
    margin-bottom: 8px;
  }

  .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 14vw, 72px);
    letter-spacing: 0.06em;
    line-height: 1;
    background: linear-gradient(135deg, var(--cyan) 0%, var(--magenta) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tag {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .link-card {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .link-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent-color, var(--cyan));
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.2s ease;
  }

  .link-card:hover {
    border-color: var(--accent-color, var(--cyan));
    background: #161616;
    transform: translateX(4px);
  }

  .link-card:hover::before {
    transform: scaleY(1);
  }

  .link-card:hover .arrow {
    transform: translateX(4px);
    color: var(--accent-color, var(--cyan));
  }

  .icon-wrap {
    width: 40px;
    height: 40px;
    border-radius: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.04);
    flex-shrink: 0;
  }

  .icon-wrap svg {
    width: 20px;
    height: 20px;
  }

  .link-info {
    flex: 1;
  }

  .platform {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .handle {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .arrow {
    font-size: 18px;
    color: var(--muted);
    transition: all 0.2s ease;
  }

  /* Platform accent colors */
  .twitch-card   { --accent-color: #9146ff; }
  .tiktok-card   { --accent-color: #00f2ea; }
  .instagram-card { --accent-color: #e1306c; }

  /* QR Section */
  .qr-section {
    margin-top: 16px;
    width: 100%;
    border: 1px solid var(--border);
    padding: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border-radius: 2px;
  }

  .qr-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
  }

  #qrcode {
    background: white;
    padding: 12px;
    border-radius: 2px;
  }

  #qrcode canvas, #qrcode img {
    display: block;
  }

  .qr-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-align: center;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 4px 0;
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="name">Marshall</div>
    <div class="tag">// links</div>
  </div>

  <div class="divider"></div>

  <!-- Twitch -->
  <a href="https://www.twitch.tv/marshgamesx" target="_blank" class="link-card twitch-card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="#9146ff" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
      </svg>
    </div>
    <div class="link-info">
      <div class="platform">Twitch</div>
      <div class="handle">marshgamesx</div>
    </div>
    <span class="arrow">→</span>
  </a>

  <!-- TikTok -->
  <a href="https://www.tiktok.com/@marshall_chavez" target="_blank" class="link-card tiktok-card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="#00f2ea" xmlns="http://www.w3.org/2000/svg">
        <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.15 8.15 0 004.77 1.52V6.75a4.85 4.85 0 01-1-.06z"/>
      </svg>
    </div>
    <div class="link-info">
      <div class="platform">TikTok</div>
      <div class="handle">@marshall_chavez</div>
    </div>
    <span class="arrow">→</span>
  </a>

  <!-- Instagram -->
  <a href="https://www.instagram.com/_da.0ne_/" target="_blank" class="link-card instagram-card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="#e1306c" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
      </svg>
    </div>
    <div class="link-info">
      <div class="platform">Instagram</div>
      <div class="handle">_da.0ne_</div>
    </div>
    <span class="arrow">→</span>
  </a>

  <div class="divider"></div>

  <!-- QR Code -->
  <div class="qr-section">
    <div class="qr-label">// scan this</div>
    <div id="qrcode"></div>
    <div class="qr-sub">opens all links ↑</div>
  </div>

</div>

<script>
  // Build a simple text payload with all three links
  const payload = [
    "Twitch: https://www.twitch.tv/marshgamesx",
    "TikTok: https://www.tiktok.com/@marshall_chavez",
    "Instagram: https://www.instagram.com/_da.0ne_/"
  ].join("\n");

  new QRCode(document.getElementById("qrcode"), {
    text: payload,
    width: 200,
    height: 200,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
</script>

</body>
</html>
