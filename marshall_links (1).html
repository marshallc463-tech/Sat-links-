<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marshall Chavez</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --card: #13131c;
    --border: rgba(255,255,255,0.07);
    --ig: #E1306C;
    --tt: #69C9D0;
    --tw: #9146FF;
    --text: #f0f0f0;
    --muted: #666;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  /* Ambient blobs */
  body::before {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(145,70,255,0.12) 0%, transparent 70%);
    top: -150px; right: -150px;
    border-radius: 50%;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(225,48,108,0.1) 0%, transparent 70%);
    bottom: -100px; left: -100px;
    border-radius: 50%;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2.4rem;
  }

  .avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--ig), var(--tw));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.05em;
    margin: 0 auto 1rem;
    box-shadow: 0 0 30px rgba(145,70,255,0.3);
  }

  .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 0.08em;
    line-height: 1;
    background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,0.65) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.35rem;
  }

  .handle {
    font-size: 0.8rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    border-radius: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    position: relative;
    overflow: hidden;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    animation: fadeUp 0.6s ease both;
  }
  .link-btn:nth-child(1) { animation-delay: 0.1s; }
  .link-btn:nth-child(2) { animation-delay: 0.2s; }
  .link-btn:nth-child(3) { animation-delay: 0.3s; }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.18s ease;
  }
  .link-btn.ig::before  { background: linear-gradient(135deg, rgba(225,48,108,0.12), rgba(253,95,0,0.08)); }
  .link-btn.tt::before  { background: linear-gradient(135deg, rgba(105,201,208,0.12), rgba(0,180,180,0.06)); }
  .link-btn.tw::before  { background: linear-gradient(135deg, rgba(145,70,255,0.14), rgba(100,40,200,0.06)); }

  .link-btn:hover {
    transform: translateY(-2px) scale(1.01);
  }
  .link-btn:hover::before { opacity: 1; }
  .link-btn.ig:hover { border-color: rgba(225,48,108,0.5); box-shadow: 0 8px 28px rgba(225,48,108,0.15); }
  .link-btn.tt:hover { border-color: rgba(105,201,208,0.5); box-shadow: 0 8px 28px rgba(105,201,208,0.12); }
  .link-btn.tw:hover { border-color: rgba(145,70,255,0.5); box-shadow: 0 8px 28px rgba(145,70,255,0.18); }

  .icon-wrap {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .ig .icon-wrap  { background: rgba(225,48,108,0.15); }
  .tt .icon-wrap  { background: rgba(105,201,208,0.12); }
  .tw .icon-wrap  { background: rgba(145,70,255,0.14); }

  .icon-wrap svg { width: 22px; height: 22px; }

  .link-info {
    flex: 1;
    position: relative; z-index: 1;
  }
  .link-platform {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 0.15rem;
  }
  .ig  .link-platform { color: var(--ig); }
  .tt  .link-platform { color: var(--tt); }
  .tw  .link-platform { color: var(--tw); }

  .link-user {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
  }

  .arrow {
    font-size: 1.1rem;
    color: var(--muted);
    position: relative; z-index: 1;
    transition: transform 0.18s ease, color 0.18s ease;
  }
  .link-btn:hover .arrow { transform: translateX(3px); color: var(--text); }


</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="avatar">MC</div>
    <div class="name">Marshall Chavez</div>
    <div class="handle">Creator · Streamer</div>
  </div>

  <div class="links">
    <!-- Instagram -->
    <a class="link-btn ig" href="https://www.instagram.com/_da.0ne_/" target="_blank" rel="noopener">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="20" height="20" rx="5.5" stroke="#E1306C" stroke-width="2"/>
          <circle cx="12" cy="12" r="4" stroke="#E1306C" stroke-width="2"/>
          <circle cx="17.5" cy="6.5" r="1" fill="#E1306C"/>
        </svg>
      </div>
      <div class="link-info">
        <div class="link-platform">Instagram</div>
        <div class="link-user">@_da.0ne_</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <!-- TikTok -->
    <a class="link-btn tt" href="https://www.tiktok.com/@marshall_chavez" target="_blank" rel="noopener">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 3h-4v11a3 3 0 1 1-3-3v-4a7 7 0 1 0 7 7V7.5A8.5 8.5 0 0 0 19 8V3Z" stroke="#69C9D0" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="link-info">
        <div class="link-platform">TikTok</div>
        <div class="link-user">@marshall_chavez</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <!-- Twitch -->
    <a class="link-btn tw" href="https://www.twitch.tv/marshgamesx" target="_blank" rel="noopener">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 2L2 6v14h5v3h3l3-3h4l5-5V2H4Z" stroke="#9146FF" stroke-width="2" stroke-linejoin="round"/>
          <line x1="11" y1="7" x2="11" y2="12" stroke="#9146FF" stroke-width="2" stroke-linecap="round"/>
          <line x1="16" y1="7" x2="16" y2="12" stroke="#9146FF" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="link-info">
        <div class="link-platform">Twitch</div>
        <div class="link-user">marshgamesx</div>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>

</div>
</body>
</html>
