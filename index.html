<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marshall's QR Code</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px 20px;
  }
  h1 {
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #555;
  }
  #qrcode {
    background: white;
    padding: 16px;
    border-radius: 4px;
  }
  p {
    font-size: 11px;
    color: #444;
    letter-spacing: 0.15em;
    text-align: center;
  }
</style>
</head>
<body>

<h1>// scan me</h1>
<div id="qrcode"></div>
<p>opens a page with all 3 links</p>

<script>
  // Minimal self-contained link page encoded as a data URI
  const mini = `data:text/html,<!DOCTYPE html><html><head><meta name='viewport' content='width=device-width,initial-scale=1'><style>*{margin:0;padding:0;box-sizing:border-box}body{background:%230a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:sans-serif;padding:32px 20px}h2{color:%23888;font-size:12px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}a{display:block;padding:18px 40px;text-decoration:none;border-radius:4px;font-size:17px;font-weight:600;width:280px;text-align:center;color:white}</style></head><body><h2>marshall // links</h2><a href='https://www.twitch.tv/marshgamesx' style='background:%239146ff'>Twitch</a><a href='https://www.tiktok.com/@marshall_chavez' style='background:%23111;border:1px solid %2300f2ea;color:%2300f2ea'>TikTok</a><a href='https://www.instagram.com/_da.0ne_/' style='background:%23e1306c'>Instagram</a></body></html>`;

  new QRCode(document.getElementById("qrcode"), {
    text: mini,
    width: 280,
    height: 280,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.L
  });
</script>

</body>
</html>
